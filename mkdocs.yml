site_name: 智悲学子
docs_dir: docs
not_in_nav: |
  /search.md
theme:
  name: material
  language: zh
  custom_dir: docs/overrides
  font: false
  icon:
    logo: material/book-open-variant
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: brown
      accent: amber
      toggle:
        icon: material/weather-night
        name: 切换到夜间模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: brown
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: 切换到日间模式
  features:
    - navigation.sections
    - navigation.footer
    - navigation.top
    - navigation.tracking
    - navigation.path
    - toc.follow
    - content.code.copy
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 6
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: false
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
extra_css:
  - assets/stylesheets/extra.css
extra_javascript:
  - assets/javascripts/font-size-controls.js
  - assets/javascripts/drawer-controls.js
  - assets/javascripts/pagefind-search-page.js
  - assets/javascripts/media-player.js
extra:
  generator: false
